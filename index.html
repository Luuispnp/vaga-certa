<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vaga Certa | Gestão Inteligente</title>
  <link rel="stylesheet" href="styles/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  
  <div class="app-container">
    <header class="main-header">
      <div class="logo">
        <div class="logo-icon"></div>
        <h1>VAGA<span>CERTA</span></h1>
      </div>
      <div class="status-badge">
        <span class="dot"></span>
        Livres: <strong id="contador">0</strong>
      </div>
    </header>

    <main class="dashboard-grid">
      <aside class="sidebar">
        <section class="glass-card">
          <h3>Configuração</h3>
          <div class="input-group">
            <label>Quantidade de Vagas</label>
            <input type="number" id="inputVagas" value="5" min="1" max="50">
          </div>
          <div class="input-group">
            <label>Distância Sensor (cm)</label>
            <input type="number" id="inputLimite" value="50" min="10" max="300">
          </div>
          <button class="btn-primary" onclick="configurarSistema()">Atualizar Sistema</button>
        </section>

        <section class="glass-card">
          <h3>Relatórios</h3>
          <button class="btn-outline" onclick="sistema.exportarDados()">Exportar JSON</button>
          <button class="btn-outline" onclick="sistema.gerarRelatorioPDF()">Gerar PDF</button>
        </section>
      </aside>

      <section class="main-content">
        <div id="estacionamento" class="vagas-grid"></div>
        
        <div class="glass-card logs-section">
          <h3>Últimas Atividades</h3>
          <ul id="lista-logs" class="custom-scroll"></ul>
        </div>
      </section>
    </main>
  </div>

  <script src="scripts/script.js"></script>
</body>
</html>
